name: Deploy Supabase Edge Function

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      function_slug:
        description: "Function slug to deploy"
        required: false
        default: "make-server-f6cf3a30"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge function
        shell: bash
        run: |
          set -euo pipefail
          SLUG="${{ github.event.inputs.function_slug }}"
          if [[ -z "${SLUG}" ]]; then
            SLUG="make-server-f6cf3a30"
          fi

          if [[ -z "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret" >&2
            exit 1
          fi
          if [[ -z "${SUPABASE_PROJECT_REF:-}" ]]; then
            echo "Missing SUPABASE_PROJECT_REF secret" >&2
            exit 1
          fi

          supabase functions deploy "${SLUG}" --project-ref "${SUPABASE_PROJECT_REF}" --no-verify-jwt
