# Publica la app en GitHub Pages al hacer push a main o master.
# Activa Pages en el repo: Settings → Pages → Source: GitHub Actions.
# La URL será: https://<usuario>.github.io/<nombre-del-repo>/
name: GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build (base = nombre del repo)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build
      - name: SPA fallback para rutas directas
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
